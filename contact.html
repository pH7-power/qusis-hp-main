<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | QUSIS</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="index.html"><img decoding="async" loading="lazy" src="images/QUSIS_LOGO_Color_Yoko_B (1).webp" alt="QUSIS"></a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="about.html">ABOUT</a></li>
                <li class="nav-item"><a href="activity.html">ACTIVITY</a></li>
                <li class="nav-item"><a href="member.html">MEMBER</a></li>

                <li class="nav-item"><a href="news.html">NEWS</a></li>
                <li class="nav-item"><a href="contact.html">CONTACT</a></li>
            </ul>
                    <!-- Hamburger Menu Icon -->
            <a href="contact.html" class="mobile-contact-btn">CONTACT</a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="section hero-sub">
            <div class="container">
                <h1 class="section-title text-teal">Contact</h1>
                <p>お問い合わせ</p>
                <p>協賛・共創・部室活動日枠・その他のお問い合わせはこちらから。</p>
            </div>
        </section>

        <section class="section contact-form-section">
            <div class="container">
                <form id="contact-form" class="contact-form" action="https://formspree.io/f/mjgewlkn" method="POST">
                    <!-- Formspree settings -->
                    <input type="hidden" name="_next" value="thanks.html">
                    <input type="hidden" name="_subject" value="QUSIS公式サイトからのお問い合わせ">
                    <div class="form-group">
                        <label for="name">お名前 <span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="お名前" required>
                    </div>
                    <div class="form-group">
                        <label for="affiliation">所属（学部/ 企業名） <span class="required">*</span></label>
                        <input type="text" id="affiliation" name="affiliation" placeholder="所属（学部/ 企業名）" required>
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="メールアドレス" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">電話番号 <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="電話番号" required>
                    </div>
                    <div class="form-group">
                        <label for="type">お問い合わせ種別 <span class="required">*</span></label>
                        <select id="type" name="category" required>
                            <option value="">選択してください</option>
                            <option value="入部希望・活動見学について">入部希望・活動見学について</option>
                            <option value="共同プロジェクト・共創のご相談">共同プロジェクト・共創のご相談</option>
                            <option value="協賛・パートナーシップについて">協賛・パートナーシップについて</option>
                            <option value="主催イベントに関するご質問">主催イベントに関するご質問</option>
                            <option value="メディア取材・掲載のご依頼">メディア取材・掲載のご依頼</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">内容 <span class="required">*</span></label>
                        <textarea id="message" name="message" rows="6" placeholder="内容" required></textarea>
                    </div>

                    <!-- Spam Protection -->
                    <input type="text" name="_gotcha" style="display:none">

                    <!-- Privacy Agreement -->
                    <div class="privacy-agreement" style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;">
                        <input type="checkbox" id="privacy_check" name="privacy_agreement" required style="width: auto; margin: 0;">
                        <label for="privacy_check">
                            <a href="privacy-policy.html" target="_blank" style="text-decoration: underline; color: var(--color-teal);">プライバシーポリシー</a>に同意する
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-primary">送信</button>

                    <p id="form-status" style="display:none; margin-top: 1rem; font-weight: bold;"></p>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links" style="margin-bottom: 10px;"><a href="privacy-policy.html" style="color: #888; font-size: 0.8rem; text-decoration: none;">プライバシーポリシー</a></div><div class="copyright">&copy; 2026 QUSIS</div>
        </div>
    </footer>
    <script src="assets/js/script.js"></script>
</body>

</html>
