<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS | QUSIS</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/news.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <a href="index.html"><img decoding="async" loading="lazy" src="images/qusis-logo-main.webp" alt="QUSIS"></a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="about.html">ABOUT</a></li>
                <li class="nav-item"><a href="activity.html">ACTIVITY</a></li>
                <li class="nav-item"><a href="member.html">MEMBER</a></li>
                <li class="nav-item"><a href="news.html">NEWS</a></li>
                <li class="nav-item"><a href="contact.html">CONTACT</a></li>
            </ul>
            <a href="contact.html" class="mobile-contact-btn">CONTACT</a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="section hero-sub">
            <div class="container">
                <h1 class="section-title text-teal">News</h1>
                <p>-最新情報-</p>
            </div>
        </section>

        <!-- 1. PICKUP Section -->
        <section id="news-pickup" class="news-pickup-section">
            <!-- Dynamically populated -->
            <div class="pickup-placeholder">Loading Pickup...</div>
        </section>

        <!-- 2. News Filter & List -->
        <section class="section news-main-section">
            <div class="container">
                <!-- Filter Tabs -->
                <div class="news-filter">
                    <button class="filter-tab active" data-category="すべて">すべて</button>
                    <button class="filter-tab" data-category="お知らせ">お知らせ</button>
                    <button class="filter-tab" data-category="イベント">イベント</button>
                    <button class="filter-tab" data-category="メディア情報">メディア情報</button>
                </div>

                <!-- News List -->
                <div id="news-list-container" class="news-list-page-container">
                    <!-- Dynamically populated -->
                    <div class="loading-spinner">Loading news...</div>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="pagination-container">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </section>
        <!-- FOOTER CTA -->
        <section class="footer-cta">
            <div class="container">
                <h2>共に、社会に、熱を。</h2>
                <p>QUSISとの共創、取材依頼など、<br>社会を熱くするあらゆる一歩をお待ちしております。</p>
                <a href="contact.html" class="cta-btn">CONTACT</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img decoding="async" loading="lazy" src="images/qusis-logo-main.webp" style="filter: brightness(0) invert(1); width: 120px;" alt="QUSIS">
                </div>
                <div class="footer-nav">
                    <ul>
                        <li><a href="about.html">About</a></li>
                        <li><a href="activity.html">Activity</a></li>
                        <li><a href="member.html">Member</a></li>
                        <li><a href="news.html">News</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-links" style="margin-bottom: 10px;"><a href="privacy-policy.html" style="color: #888; font-size: 0.8rem; text-decoration: none;">プライバシーポリシー</a></div><div class="copyright">&copy; 2026 QUSIS</div>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/news.js"></script>
