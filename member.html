<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMBER | QUSIS</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="index.html"><img src="assets/images/qusis-logo-color.png" alt="QUSIS"></a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="about.html">ABOUT</a></li>
                <li class="nav-item"><a href="activity.html">ACTIVITY</a></li>
                <li class="nav-item"><a href="member.html">MEMBER</a></li>
                <li class="nav-item"><a href="co-creation.html">CO-CREATION</a></li>
                <li class="nav-item"><a href="news.html">NEWS</a></li>
                <li class="nav-item"><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>
    <a href="contact.html" class="cta-btn">Contact</a>

    <main>
        <section class="section hero-sub">
            <div class="container">
                <h1 class="section-title text-teal">Member</h1>
                <p>-CM（コミュニティマネージャー）紹介-</p>
            </div>
        </section>

        <section class="section member-cms-section">
            <div class="container">
                <!-- 1. Filter -->
                <div class="member-filter-container">
                    <ul id="member-filter" class="member-filter">
                        <!-- JS injected -->
                    </ul>
                </div>

                <!-- 2. Member Grid -->
                <div class="member-grid-wrapper">
                    <h2 class="section-title text-teal" style="font-size: 1.5rem; margin-bottom: 20px;">All Members</h2>

                    <div class="grid-container-relative">
                        <div id="member-grid" class="member-grid">
                            <!-- JS injected cards -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Modal Structure -->
        <div id="member-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-body">
                    <div class="modal-img-container">
                        <img id="modal-img" src="" alt="Member Photo">
                    </div>
                    <div class="modal-info">
                        <h3 id="modal-name-ja"></h3>
                        <p id="modal-name-en" class="font-en"></p>
                        <p id="modal-faculty"></p>
                        <p id="modal-roles" class="text-teal"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="copyright">&copy; 2026 QUSIS</div>
        </div>
    </footer>
    <script src="assets/js/members.js"></script>
    <script src="assets/js/member-cms.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
